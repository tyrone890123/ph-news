<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PH News Digest</title>
<meta name="description" content="A daily digest of aggregated Philippine news.">
<script>
/* Apply stored display preferences before first paint to avoid a flash. */
try {
  var t = localStorage.getItem("ph-news-theme");
  if (t === "light" || t === "dark") document.documentElement.dataset.theme = t;
  var s = parseInt(localStorage.getItem("ph-news-textsize"), 10);
  if (s >= 80 && s <= 150 && s !== 100) document.documentElement.style.fontSize = s + "%";
} catch (e) {}
</script>
<link rel="stylesheet" href="style.css">
</head>
<body>
<header>
  <p class="eyebrow">PH News Digest</p>
  <h1 id="masthead-date">Loading…</h1>
  <p id="updated" class="updated"></p>
  <nav class="date-nav" aria-label="Digest date">
    <button id="prev-day" type="button" disabled>Previous</button>
    <select id="date-select" aria-label="Choose digest date" disabled></select>
    <button id="next-day" type="button" disabled>Next</button>
  </nav>
  <div class="prefs">
    <button id="theme-toggle" type="button">Theme: Auto</button>
    <label class="prefs-label" for="text-size">Text size</label>
    <input id="text-size" type="range" min="80" max="150" step="5" value="100">
    <output id="text-size-value" for="text-size">100%</output>
  </div>
</header>
<main id="main">
  <p id="notice" class="notice" hidden></p>
  <div id="filters" class="filters" role="group" aria-label="Filter stories by category"></div>
  <section id="stories" class="stories" aria-label="Stories">
    <p class="muted">Loading…</p>
  </section>
</main>
<p id="live-region" class="visually-hidden" aria-live="polite"></p>
<footer>
  <p>Summaries are AI-generated paraphrases and may contain errors. Each story links to its original source.</p>
  <p><a href="https://github.com/tyrone890123/ph-news">Source on GitHub</a></p>
</footer>
<script src="app.js"></script>
</body>
</html>
